server {
    listen 80;

    location /dashboard/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /dashboard/favicon.svg {
        alias /usr/share/nginx/html/favicon.svg;
    }

    location /dashboard/icons.svg {
        alias /usr/share/nginx/html/icons.svg;
    }

    location /dashboard/ {
        alias /usr/share/nginx/html/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }
}